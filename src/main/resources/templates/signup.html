<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>GymTracker - Rekisteröidy</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link
      type="text/css"
      rel="stylesheet"
      th:href="@{/css/bootstrap.min.css}"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5 mb-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow-sm border-0">
            <div class="card-body p-5">
              <h2 class="text-center mb-4">Luo uusi tunnus</h2>

              <form
                th:object="${signupform}"
                th:action="@{/saveuser}"
                action="#"
                method="post"
              >
                <div class="mb-3">
                  <label class="form-label fw-bold">Käyttäjätunnus</label>
                  <input
                    type="text"
                    th:field="*{username}"
                    class="form-control"
                    placeholder="Min. 5 merkkiä"
                  />
                  <div
                    th:if="${#fields.hasErrors('username')}"
                    th:errors="*{username}"
                    class="text-danger small mt-1"
                  >
                    Username Error
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold">Sähköposti</label>
                  <input
                    type="email"
                    th:field="*{email}"
                    class="form-control"
                    placeholder="esim. matti@esimerkki.fi"
                  />
                  <div
                    th:if="${#fields.hasErrors('email')}"
                    th:errors="*{email}"
                    class="text-danger small mt-1"
                  >
                    Email Error
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold">Salasana</label>
                  <input
                    type="password"
                    th:field="*{password}"
                    class="form-control"
                    placeholder="Min. 7 merkkiä"
                  />
                  <div
                    th:if="${#fields.hasErrors('password')}"
                    th:errors="*{password}"
                    class="text-danger small mt-1"
                  >
                    Password Error
                  </div>
                </div>

                <div class="mb-4">
                  <label class="form-label fw-bold">Toista salasana</label>
                  <input
                    type="password"
                    th:field="*{passwordCheck}"
                    class="form-control"
                    placeholder="Toista salasana uudelleen"
                  />
                  <div
                    th:if="${#fields.hasErrors('passwordCheck')}"
                    th:errors="*{passwordCheck}"
                    class="text-danger small mt-1"
                  >
                    Password Match Error
                  </div>
                </div>

                <div class="d-grid gap-2">
                  <button type="submit" class="btn btn-primary btn-lg">
                    Rekisteröidy
                  </button>
                </div>
              </form>

              <hr class="my-4" />

              <div class="text-center">
                <p class="mb-2">
                  Onko sinulla jo tunnus?
                  <a th:href="@{/login}" class="text-decoration-none"
                    >Kirjaudu sisään</a
                  >
                </p>
                <a th:href="@{/}" class="btn btn-outline-secondary btn-sm mt-2"
                  >Takaisin etusivulle</a
                >
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
