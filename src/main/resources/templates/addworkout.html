<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <title>GymTracker - Lisää treeni</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="col-md-6 mx-auto bg-white p-4 rounded shadow-sm">
        <h2 class="text-primary mb-4">Lisää uusi treeni</h2>
        <form th:action="@{/save}" th:object="${workout}" method="post">
          <div class="mb-3">
            <label class="form-label">Treenin nimi</label>
            <input
              type="text"
              th:field="*{name}"
              class="form-control"
              required
            />
          </div>
          <div class="mb-3">
            <label class="form-label">Kategoria</label>
            <select th:field="*{category}" class="form-select">
              <option value="Yläkroppa">Yläkroppa</option>
              <option value="Jalat">Jalat</option>
              <option value="Cardio">Cardio</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Liikkeet</label>
            <textarea
              th:field="*{exercises}"
              class="form-control"
              rows="3"
            ></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Muistiinpanot</label>
            <textarea
              th:field="*{notes}"
              class="form-control"
              rows="2"
            ></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Päivämäärä</label>
            <input type="date" th:field="*{date}" class="form-control" />
          </div>

          <div class="mb-3 form-check" sec:authorize="hasAuthority('ADMIN')">
            <input
              type="checkbox"
              th:field="*{example}"
              class="form-check-input"
              id="isExample"
            />
            <label class="form-check-label" for="isExample"
              >Tallenna mallitreeniksi (kaikkien nähtäville)</label
            >
          </div>

          <div class="d-flex justify-content-between">
            <a href="/" class="btn btn-secondary">Peruuta</a>
            <button type="submit" class="btn btn-primary">
              Tallenna treeni
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
